<!DOCTYPE html>
<html lang="en-MY">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Trip Planner · PlanWise Malaysia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <span class="logo-icon">🌴</span>
                <span class="logo-text">PlanWise</span>
            </a>
            <nav class="header-nav">
                <a href="index.html">Explore</a>
                <a href="results.html">Map</a>
            </nav>
        </div>
    </header>

    <section class="planner-section">
        <div class="planner-header">
            <h1>Your Itinerary</h1>
            <p class="planner-sub">Your saved gems, ready for the road.</p>
        </div>

        <div class="planner-empty" id="planner-empty" style="display: none;">
            <h3>Your backpack is empty 🎒</h3>
            <p style="color: var(--muted); margin-bottom: 1.5rem;">Explore the map and click "+ Save" to build your trip here.</p>
            <a href="index.html" class="btn-plan" style="text-decoration: none; display: inline-block;">Explore Gems</a>
        </div>

        <div class="itinerary-list" id="itinerary-list">
            </div>
    </section>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-brand"><span class="logo-icon">🌴</span> PlanWise Malaysia</div>
            <p class="footer-copy">© 2026 PlanWise. Built with ❤️ in Malaysia.</p>
        </div>
    </footer>

    <script src="planner.js"></script>
</body>
</html>
